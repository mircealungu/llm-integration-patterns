name: Deploy site to GitHub Pages

# Replaces the classic Pages Jekyll build so we can serve from web/ instead of
# the repo root. build.py generates the pages into web/ (committed by sync.sh);
# this workflow runs Jekyll over web/ and deploys the result.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build the ACM PDF from content/ and drop it into the site so it is
      # served at /paper.pdf. Non-fatal: a LaTeX hiccup must never block the
      # website deploy (the last good PDF simply stays until the next success).
      - name: Build the paper PDF and publish it into the site (non-fatal)
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-publishers \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra texlive-bibtex-extra
          python3 paper/build_paper.py
          cp paper/paper.pdf web/paper.pdf
      - uses: actions/configure-pages@v5
      - name: Build Jekyll site from web/
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./web
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  # Deploy only for real pushes to main — PR/branch runs just validate the build.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
